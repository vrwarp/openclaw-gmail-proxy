# Runs the proxy OUTSIDE the VM (e.g. on the VM's docker host).
#
# Persistence (see README): everything mutable lives in the `proxy-data` volume
# (credentials, audit log, keys, the encrypted Gmail token, the OAuth client
# config, kill-switch). `policy.yaml` is a writable bind mount so edits from the
# admin UI persist to the host file. Nothing else needs mapping.
#
# Ports:
#   8443  MCP endpoint  -> reachable by the OpenClaw VM ONLY. Restrict with a
#         host firewall / a docker network the VM is on. Do NOT expose publicly.
#   8081  Admin UI      -> bound to 127.0.0.1 on the host (operator only). Reach
#         it via an SSH tunnel; it is never reachable from the VM.
services:
  gmail-proxy:
    build: .
    image: openclaw-gmail-proxy:latest
    restart: unless-stopped
    environment:
      GMAIL_BACKEND: google            # "mock" for a demo with sample data
      POLICY_PATH: /app/policy.yaml
      DATA_DIR: /data
      TOKEN_STORE_PATH: /data/token.json
      # Run the app as a specific host user so a locked-down bind mount (readable
      # only by that user, e.g. a Synology `docker_user`) still works. Find the
      # numbers with `id docker_user`. Defaults to 10001 when unset.
      PUID: ${PUID:-10001}
      PGID: ${PGID:-10001}
      # The admin-UI login token. If left unset, a random one is generated on
      # first start, printed to the container logs (`docker compose logs`), and
      # persisted under /data — set this to pin your own instead.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # Optional: an out-of-band token-encryption key (stronger than the default,
      # which auto-generates and persists a key under /data). Generate with:
      #   python -c "from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())"
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      # The Gmail OAuth client (id/secret) is entered on the admin Setup page and
      # stored in /data — no env vars needed. You can pre-seed the id here:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Optional "Sign in with Google" for the admin UI (restricted to the proxied account).
      ADMIN_OAUTH_CLIENT_ID: ${ADMIN_OAUTH_CLIENT_ID:-}
      ADMIN_OAUTH_CLIENT_SECRET: ${ADMIN_OAUTH_CLIENT_SECRET:-}
      ADMIN_OAUTH_REDIRECT_URI: ${ADMIN_OAUTH_REDIRECT_URI:-http://localhost:8081/auth/callback}
      ADMIN_ALLOWED_EMAIL: ${ADMIN_ALLOWED_EMAIL:-}
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8443"
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: "8081"
    volumes:
      # All mutable state. On a NAS, swap the named volume for a bind mount into
      # a folder owned by your docker_user (set PUID/PGID above to match):
      #   - /volume1/docker/openclaw-gmail-proxy/data:/data
      - proxy-data:/data                     # all mutable state (persist this)
      - ./policy.yaml:/app/policy.yaml        # writable: the admin UI edits it
    ports:
      # MCP: change 0.0.0.0 to the host IP on the VM-facing network in production.
      - "8443:8443"
      # Admin: localhost-only; tunnel in with `ssh -L 8081:127.0.0.1:8081 host`.
      - "127.0.0.1:8081:8081"

volumes:
  proxy-data:
